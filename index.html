<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Car Wrap Visualizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 1.5rem; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
.layout { display: grid; grid-template-columns: 1fr 265px; gap: 1.25rem; align-items: start; }
.viewport { background: #111; border-radius: 14px; overflow: hidden; position: relative; aspect-ratio: 16/10; }
canvas { width: 100%; height: 100%; display: block; }
.overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; gap: 10px; transition: opacity 0.5s; }
.spinner { width: 32px; height: 32px; border: 2.5px solid #2a2a2a; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-msg { color: #555; font-size: 12px; }
.badge { position: absolute; bottom: 12px; left: 14px; background: rgba(0,0,0,0.7); border-radius: 6px; padding: 5px 11px; font-size: 11px; color: #ccc; }
.hint { position: absolute; top: 12px; right: 14px; background: rgba(0,0,0,0.5); border-radius: 6px; padding: 4px 10px; font-size: 10px; color: #777; }
.controls { display: flex; flex-direction: column; gap: 0.85rem; }
.card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 0.9rem 1.1rem; }
.lbl { font-size: 10px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 9px; }
.color-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; margin-bottom: 7px; }
.sw { width: 100%; aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s; }
.sw:hover { transform: scale(1.12); }
.sw.on { border-color: #fff; transform: scale(1.12); }
.color-name { font-size: 11px; color: #666; }
.row { display: flex; gap: 5px; }
.pill { flex: 1; font-size: 11px; padding: 5px 4px; border-radius: 6px; border: 0.5px solid #333; background: transparent; cursor: pointer; color: #888; text-align: center; transition: all 0.12s; font-family: inherit; }
.pill:hover { background: #222; }
.pill.on { background: #fff; color: #000; border-color: #fff; }
.price-card { background: #1a1a1a; border-radius: 12px; padding: 0.9rem 1.1rem; text-align: center; border: 0.5px solid #2a2a2a; }
.price-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.price-val { font-size: 26px; font-weight: 500; }
.cta { width: 100%; padding: 11px; font-size: 13px; font-weight: 500; border-radius: 8px; background: #fff; color: #000; border: none; cursor: pointer; transition: opacity 0.12s; font-family: inherit; }
.cta:hover { opacity: 0.85; }
@media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Porsche 911 GT2 — wrap visualizer</h1>
<p class="sub">Drag to rotate · Scroll to zoom · See your wrap in real time</p>
<div class="layout">
  <div class="viewport">
    <canvas id="c"></canvas>
    <div class="overlay" id="ov">
      <div class="spinner"></div>
      <div class="load-msg" id="lm">Loading Porsche 911...</div>
    </div>
    <div class="badge" id="badge">Pearl white · Gloss</div>
    <div class="hint">drag · scroll · pinch</div>
  </div>
  <div class="controls">
    <div class="card">
      <div class="lbl">Wrap color</div>
      <div class="color-grid" id="cg"></div>
      <div class="color-name" id="cn">Pearl white</div>
    </div>
    <div class="card">
      <div class="lbl">Finish</div>
      <div class="row" id="fr"></div>
    </div>
    <div class="card">
      <div class="lbl">Scene</div>
      <div class="row" id="sr"></div>
    </div>
    <div class="price-card">
      <div class="price-label">Estimated starting price</div>
      <div class="price-val" id="pv">$2,200</div>
    </div>
    <button class="cta" onclick="alert('Quote request sent! We will contact you shortly.')">Get a free quote</button>
  </div>
</div>

const COLORS = [
  {name:'Pearl white', hex:'#f0f0e8', r:0.12, m:0.55},
  {name:'Midnight black', hex:'#0d0d12', r:0.08, m:0.75},
  {name:'Guards red', hex:'#cc1a1a', r:0.10, m:0.60},
  {name:'Racing yellow', hex:'#f0c000', r:0.12, m:0.55},
  {name:'Ocean blue', hex:'#1a3f8f', r:0.10, m:0.65},
  {name:'British green', hex:'#1a4a2e', r:0.11, m:0.60},
  {name:'Burnt orange', hex:'#c44a08', r:0.12, m:0.58},
  {name:'Royal purple', hex:'#5a1278', r:0.11, m:0.60},
  {name:'Gunmetal', hex:'#2e3240', r:0.22, m:0.80},
  {name:'Rose gold', hex:'#b87868', r:0.20, m:0.68},
];
const FINISHES = [
  {name:'Gloss', r:0.06, m:0.72, add:0},
  {name:'Matte', r:0.78, m:0.00, add:100},
  {name:'Satin', r:0.32, m:0.28, add:150},
  {name:'Chrome', r:0.02, m:1.00, add:600},
];
const SCENES = [
  {name:'Studio', bg:'#111111', gr:'#1a1a1a'},
  {name:'Showroom', bg:'#0a1020', gr:'#111820'},
  {name:'Daylight', bg:'#b0bcc8', gr:'#888880'},
];

let st = {color:COLORS[0], finish:FINISHES[0], scene:SCENES[0]};
let bodyMeshes=[], renderer, camera, scene3;
let sph = {theta:0.6, phi:1.15, r:6.0};
let drag=false, prev={x:0,y:0}, lastInt=Date.now();

function buildUI() {
  const cg=document.getElementById('cg');
  COLORS.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='sw'+(i===0?' on':'');
    s.style.background=c.hex;
    if(c.hex==='#f0f0e8') s.style.boxShadow='inset 0 0 0 1px rgba(0,0,0,0.2)';
    s.title=c.name;
    s.onclick=()=>{ document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on')); s.classList.add('on'); st.color=c; document.getElementById('cn').textContent=c.name; updateBadge(); applyMat(); updatePrice(); };
    cg.appendChild(s);
  });
  const fr=document.getElementById('fr');
  FINISHES.forEach((f,i)=>{
    const b=document.createElement('button');
    b.className='pill'+(i===0?' on':'');
    b.textContent=f.name;
    b.onclick=()=>{ document.querySelectorAll('#fr .pill').forEach(x=>x.classList.remove('on')); b.classList.add('on'); st.finish=f; updateBadge(); applyMat(); updatePrice(); };
    fr.appendChild(b);
  });
  const sr=document.getElementById('sr');
  SCENES.forEach((sc,i)=>{
    const b=document.createElement('button');
    b.className='pill'+(i===0?' on':'');
    b.textContent=sc.name;
    b.onclick=()=>{ document.querySelectorAll('#sr .pill').forEach(x=>x.classList.remove('on')); b.classList.add('on'); st.scene=sc; applyScene(); };
    sr.appendChild(b);
  });
}

function updateBadge(){ document.getElementById('badge').textContent=st.color.name+' · '+st.finish.name; }
function updatePrice(){ document.getElementById('pv').textContent='$'+(2200+st.finish.add).toLocaleString(); }

function applyMat(){
  const col=new THREE.Color(st.color.hex);
  bodyMeshes.forEach(mesh=>{
    const mats=Array.isArray(mesh.material)?mesh.material:[mesh.material];
    mats.forEach(m=>{ if(m&&(m.isMeshStandardMaterial||m.isMeshPhysicalMaterial)){ m.color.set(col); m.roughness=st.finish.r; m.metalness=st.finish.m; m.needsUpdate=true; }});
  });
}

function applyScene(){
  if(!scene3) return;
  scene3.background=new THREE.Color(st.scene.bg);
  renderer.setClearColor(new THREE.Color(st.scene.bg),1);
  if(scene3.gnd) scene3.gnd.material.color.set(new THREE.Color(st.scene.gr));
}

function updateCam(){
  camera.position.x=sph.r*Math.sin(sph.phi)*Math.sin(sph.theta);
  camera.position.y=sph.r*Math.cos(sph.phi);
  camera.position.z=sph.r*Math.sin(sph.phi)*Math.cos(sph.theta);
  camera.lookAt(0,0.5,0);
}

function init3D(){
  const canvas=document.getElementById('c');
  const cont=canvas.parentElement;
  const W=cont.clientWidth||640, H=cont.clientHeight||400;
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.3;
  renderer.setClearColor(0x111111,1);
  scene3=new THREE.Scene(); scene3.background=new THREE.Color(0x111111);
  camera=new THREE.PerspectiveCamera(38,W/H,0.01,100); updateCam();
  scene3.add(new THREE.AmbientLight(0xffffff,0.5));
  const key=new THREE.DirectionalLight(0xffffff,2.0); key.position.set(4,8,5); key.castShadow=true; key.shadow.mapSize.setScalar(2048); scene3.add(key);
  const fill=new THREE.DirectionalLight(0x6080ff,0.7); fill.position.set(-5,3,-4); scene3.add(fill);
  const rim=new THREE.DirectionalLight(0xffffff,1.1); rim.position.set(1,5,-7); scene3.add(rim);
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.85,metalness:0.1}));
  gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.02; gnd.receiveShadow=true; scene3.add(gnd); scene3.gnd=gnd;

  canvas.addEventListener('mousedown',e=>{drag=true;prev={x:e.clientX,y:e.clientY};lastInt=Date.now();e.preventDefault();});
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{ if(!drag)return; sph.theta-=(e.clientX-prev.x)*0.007; sph.phi=Math.max(0.18,Math.min(1.45,sph.phi+(e.clientY-prev.y)*0.007)); prev={x:e.clientX,y:e.clientY}; updateCam(); lastInt=Date.now(); });
  canvas.addEventListener('wheel',e=>{ sph.r=Math.max(2.5,Math.min(14,sph.r+e.deltaY*0.007)); updateCam(); lastInt=Date.now(); e.preventDefault(); },{passive:false});
  let ld=0;
  canvas.addEventListener('touchstart',e=>{ lastInt=Date.now(); if(e.touches.length===1){drag=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}else if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',e=>{ lastInt=Date.now(); if(e.touches.length===1&&drag){const dx=e.touches[0].clientX-prev.x,dy=e.touches[0].clientY-prev.y;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};sph.theta-=dx*0.009;sph.phi=Math.max(0.18,Math.min(1.45,sph.phi+dy*0.009));updateCam();}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);sph.r=Math.max(2.5,Math.min(14,sph.r-(d-ld)*0.02));ld=d;updateCam();} e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',()=>drag=false);
  window.addEventListener('resize',()=>{ const W2=cont.clientWidth,H2=cont.clientHeight; renderer.setSize(W2,H2); camera.aspect=W2/H2; camera.updateProjectionMatrix(); });

  function animate(){ requestAnimationFrame(animate); if(Date.now()-lastInt>2500){sph.theta+=0.0025;updateCam();} renderer.render(scene3,camera); }
  animate();
  loadModel();
}

function loadModel(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload=()=>{
    document.getElementById('lm').textContent='Building model...';
    const b=atob(MODEL_B64);
    const buf=new ArrayBuffer(b.length);
    const view=new Uint8Array(buf);
    for(let i=0;i<b.length;i++) view[i]=b.charCodeAt(i);
    const loader=new THREE.GLTFLoader();
    loader.parse(buf,'',gltf=>{
      const model=gltf.scene;
      const box=new THREE.Box3().setFromObject(model);
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3());
      model.scale.setScalar(3.2/Math.max(size.x,size.y,size.z));
      model.position.sub(center.multiplyScalar(3.2/Math.max(size.x,size.y,size.z)));
      const box2=new THREE.Box3().setFromObject(model);
      model.position.y-=box2.min.y;
      model.traverse(child=>{
        if(!child.isMesh) return;
        child.castShadow=true; child.receiveShadow=true;
        if(child.material){
          const mats=Array.isArray(child.material)?child.material:[child.material];
          mats.forEach(m=>{ if(m.isMeshStandardMaterial||m.isMeshPhysicalMaterial) bodyMeshes.push(child); });
        }
      });
      if(!bodyMeshes.length) model.traverse(c=>{ if(c.isMesh) bodyMeshes.push(c); });
      scene3.add(model);
      applyMat();
      const ov=document.getElementById('ov');
      ov.style.opacity='0';
      setTimeout(()=>ov.style.display='none',500);
    }, err=>{ document.getElementById('lm').textContent='Error: '+err.message; console.error(err); });
  };
  document.head.appendChild(s);
}

buildUI(); init3D();
</script>
</body>
</html>
