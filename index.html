<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tesla Model 3 — Wrap Visualizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 1.5rem; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
.layout { display: grid; grid-template-columns: 1fr 265px; gap: 1.25rem; align-items: start; }
.carousel { background: #111; border-radius: 14px; overflow: hidden; position: relative; aspect-ratio: 16/10; }
.slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s; }
.slide.active { opacity: 1; }
.slide canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
.arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.15s; backdrop-filter: blur(4px); }
.arrow:hover { background: rgba(0,0,0,0.8); }
.arrow-l { left: 12px; }
.arrow-r { right: 12px; }
.dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); border: none; cursor: pointer; transition: all 0.2s; padding: 0; }
.dot.active { background: #fff; transform: scale(1.2); }
.badge { position: absolute; bottom: 12px; left: 14px; background: rgba(0,0,0,0.7); border-radius: 6px; padding: 5px 11px; font-size: 11px; color: #ccc; z-index: 10; backdrop-filter: blur(4px); }
.controls { display: flex; flex-direction: column; gap: 0.85rem; }
.card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 0.9rem 1.1rem; }
.lbl { font-size: 10px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 9px; }
.color-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; margin-bottom: 7px; }
.sw { width: 100%; aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s; }
.sw:hover { transform: scale(1.12); }
.sw.on { border-color: #fff; transform: scale(1.12); }
.color-name { font-size: 11px; color: #666; }
.row { display: flex; gap: 5px; }
.pill { flex: 1; font-size: 11px; padding: 5px 4px; border-radius: 6px; border: 0.5px solid #333; background: transparent; cursor: pointer; color: #888; text-align: center; transition: all 0.12s; font-family: inherit; }
.pill:hover { background: #222; }
.pill.on { background: #fff; color: #000; border-color: #fff; }
.price-card { background: #1a1a1a; border-radius: 12px; padding: 0.9rem 1.1rem; text-align: center; border: 0.5px solid #2a2a2a; }
.price-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.price-val { font-size: 26px; font-weight: 500; }
.cta { width: 100%; padding: 11px; font-size: 13px; font-weight: 500; border-radius: 8px; background: #fff; color: #000; border: none; cursor: pointer; transition: opacity 0.12s; font-family: inherit; }
.cta:hover { opacity: 0.85; }
@media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Tesla Model 3 — wrap visualizer</h1>
<p class="sub">Choose a color to preview your wrap in real time</p>
<div class="layout">
  <div class="carousel" id="carousel">
    <div class="slide active" data-idx="0"><canvas></canvas></div>
    <div class="slide" data-idx="1"><canvas></canvas></div>
    <div class="slide" data-idx="2"><canvas></canvas></div>
    <div class="slide" data-idx="3"><canvas></canvas></div>
    <div class="slide" data-idx="4"><canvas></canvas></div>
    <button class="arrow arrow-l" onclick="nav(-1)">&#8249;</button>
    <button class="arrow arrow-r" onclick="nav(1)">&#8250;</button>
    <div class="dots" id="dots"></div>
    <div class="badge" id="badge">Pearl white · Gloss</div>
  </div>
  <div class="controls">
    <div class="card">
      <div class="lbl">Wrap color</div>
      <div class="color-grid" id="cg"></div>
      <div class="color-name" id="cn">Pearl white</div>
    </div>
    <div class="card">
      <div class="lbl">Finish</div>
      <div class="row" id="fr"></div>
    </div>
    <div class="price-card">
      <div class="price-label">Estimated starting price</div>
      <div class="price-val" id="pv">$2,200</div>
    </div>
    <button class="cta" onclick="alert('Quote request sent! We will contact you shortly.')">Get a free quote</button>
  </div>
</div>

<script>
const COLORS = [
  {name:'Pearl white', hex:'#ffffff'},
  {name:'Midnight black', hex:'#0a0a0a'},
  {name:'Racing red', hex:'#c0201e'},
  {name:'Sunflower', hex:'#d4a017'},
  {name:'Ocean blue', hex:'#1a3a8a'},
  {name:'British green', hex:'#2a5a3a'},
  {name:'Burnt orange', hex:'#c4651a'},
  {name:'Royal purple', hex:'#5a1a8a'},
  {name:'Gunmetal', hex:'#4a4e5a'},
  {name:'Rose gold', hex:'#b87868'},
];
const FINISHES = [
  {name:'Gloss', add:0},
  {name:'Matte', add:100},
  {name:'Satin', add:150},
  {name:'Chrome', add:600},
];

const IMAGES = ['./images/1.webp','./images/2.webp','./images/3.webp','./images/4.webp','./images/5.webp'];
let currentSlide = 0;
let st = { color: COLORS[0], finish: FINISHES[0] };
const slideData = []; // {origData, mask, canvas, width, height}
const slides = document.querySelectorAll('.slide');
const totalSlides = slides.length;

// Build UI
const cg = document.getElementById('cg');
COLORS.forEach((c, i) => {
  const s = document.createElement('div');
  s.className = 'sw' + (i === 0 ? ' on' : '');
  s.style.background = c.hex;
  if (c.hex === '#ffffff') s.style.boxShadow = 'inset 0 0 0 1px rgba(255,255,255,0.3)';
  if (c.hex === '#0a0a0a') s.style.boxShadow = 'inset 0 0 0 1px rgba(255,255,255,0.15)';
  s.title = c.name;
  s.onclick = () => {
    document.querySelectorAll('.sw').forEach(x => x.classList.remove('on'));
    s.classList.add('on');
    st.color = c;
    document.getElementById('cn').textContent = c.name;
    updateBadge();
    applyAllColors();
    updatePrice();
  };
  cg.appendChild(s);
});

const fr = document.getElementById('fr');
FINISHES.forEach((f, i) => {
  const b = document.createElement('button');
  b.className = 'pill' + (i === 0 ? ' on' : '');
  b.textContent = f.name;
  b.onclick = () => {
    document.querySelectorAll('#fr .pill').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    st.finish = f;
    updateBadge();
    updatePrice();
  };
  fr.appendChild(b);
});

// Dots
const dotsEl = document.getElementById('dots');
for (let i = 0; i < totalSlides; i++) {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
}

function updateBadge() { document.getElementById('badge').textContent = st.color.name + ' \u00b7 ' + st.finish.name; }
function updatePrice() { document.getElementById('pv').textContent = '$' + (2200 + st.finish.add).toLocaleString(); }

// Carousel navigation
function nav(dir) { goTo((currentSlide + dir + totalSlides) % totalSlides); }
function goTo(idx) {
  slides[currentSlide].classList.remove('active');
  document.querySelectorAll('.dot')[currentSlide].classList.remove('active');
  currentSlide = idx;
  slides[currentSlide].classList.add('active');
  document.querySelectorAll('.dot')[currentSlide].classList.add('active');
}

// Touch/swipe support
let touchStartX = 0;
document.getElementById('carousel').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('carousel').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) nav(dx > 0 ? -1 : 1);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nav(-1);
  if (e.key === 'ArrowRight') nav(1);
});

// Color engine — direct pixel manipulation on canvas
function initSlide(idx) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = IMAGES[idx];
  img.onload = () => {
    const canvas = slides[idx].querySelector('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const origData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    // Build mask: identify body panel pixels
    const mask = new Uint8Array(canvas.width * canvas.height);
    for (let i = 0; i < mask.length; i++) {
      const r = origData.data[i*4], g = origData.data[i*4+1], b = origData.data[i*4+2];
      const lum = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
      const maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
      const sat = maxC > 0 ? (maxC - minC) / maxC : 0;

      // Body panels: neutral color (low saturation) + not too dark
      // Use two zones: confident (bright) and probable (medium)
      let score = 0;
      if (sat < 0.10) {
        if (lum > 0.65) score = 1.0;                              // Bright body — full confidence
        else if (lum > 0.42) score = (lum - 0.42) / 0.23;         // Shadowed body — ramp up
      } else if (sat < 0.18 && lum > 0.55) {
        score = (1 - (sat - 0.10) / 0.08) * Math.min(1, (lum - 0.55) / 0.2); // Slightly saturated bright area
      }
      mask[i] = Math.round(score * 255);
    }

    slideData[idx] = { origData: new Uint8ClampedArray(origData.data), mask, canvas, width: canvas.width, height: canvas.height };
    loaded++;
    if (loaded === totalSlides) applyAllColors();
  };
}

function applyColorToSlide(idx, hex) {
  const sd = slideData[idx];
  if (!sd) return;
  const ctx = sd.canvas.getContext('2d');

  if (hex === '#ffffff') {
    ctx.putImageData(new ImageData(new Uint8ClampedArray(sd.origData), sd.width, sd.height), 0, 0);
    return;
  }

  const tr = parseInt(hex.slice(1, 3), 16) / 255;
  const tg = parseInt(hex.slice(3, 5), 16) / 255;
  const tb = parseInt(hex.slice(5, 7), 16) / 255;

  const newData = new Uint8ClampedArray(sd.origData);

  for (let i = 0; i < sd.mask.length; i++) {
    const s = sd.mask[i] / 255;
    if (s > 0) {
      const j = i * 4;
      // Multiply blend: base * color, preserves highlights and shadows
      newData[j]     = Math.round(newData[j]     * (1 - s + s * tr));
      newData[j + 1] = Math.round(newData[j + 1] * (1 - s + s * tg));
      newData[j + 2] = Math.round(newData[j + 2] * (1 - s + s * tb));
    }
  }

  ctx.putImageData(new ImageData(newData, sd.width, sd.height), 0, 0);
}

function applyAllColors() {
  for (let i = 0; i < totalSlides; i++) applyColorToSlide(i, st.color.hex);
}

// Initialize all slides
let loaded = 0;
for (let i = 0; i < totalSlides; i++) initSlide(i);
</script>
</body>
</html>
